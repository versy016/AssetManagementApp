<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GearOps — Test Checklist</title>
<style>
  :root {
    --brand:      #1E4FA8;
    --brand-mid:  #2563EB;
    --brand-light:#EBF0FB;
    --header-bg:  #1E3A5F;
    --pass:       #065F46;
    --pass-bg:    #ECFDF5;
    --pass-border:#A7F3D0;
    --fail:       #991B1B;
    --fail-bg:    #FEE2E2;
    --fail-border:#FECACA;
    --amber:      #92400E;
    --amber-bg:   #FEF3C7;
    --grey:       #64748B;
    --grey-light: #F8FAFC;
    --border:     #CBD5E1;
    --text:       #0F172A;
    --sub:        #475569;
    --white:      #FFFFFF;
    --radius:     10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #F1F5F9;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .app-header {
    background: var(--header-bg);
    color: white;
    padding: 20px 32px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .app-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
  .app-header p  { font-size: 13px; color: #94A3B8; margin-top: 2px; }
  .header-meta   { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }

  /* ── Progress bar ── */
  .progress-wrap { flex: 1; min-width: 220px; }
  .progress-bar-bg {
    height: 8px; border-radius: 4px; background: rgba(255,255,255,0.15);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #34D399, #10B981);
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 12px; color: #CBD5E1; margin-top: 4px; }

  /* ── Stat pills ── */
  .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 700; cursor: default;
  }
  .pill-total   { background: rgba(255,255,255,0.12); color: #E2E8F0; }
  .pill-pass    { background: rgba(52,211,153,0.2);   color: #6EE7B7; }
  .pill-fail    { background: rgba(248,113,113,0.2);  color: #FCA5A5; }
  .pill-pending { background: rgba(251,191,36,0.2);   color: #FDE68A; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 32px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 112px; z-index: 90;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--brand-mid); color: white; }
  .btn-primary:hover { background: var(--brand); }
  .btn-outline { background: white; color: var(--sub); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--grey-light); }
  .btn-danger  { background: var(--fail-bg); color: var(--fail); border: 1.5px solid var(--fail-border); }
  .btn-danger:hover { background: #FEE2E2; }

  .search-box {
    margin-left: auto;
    padding: 7px 12px; border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px; width: 220px; outline: none;
  }
  .search-box:focus { border-color: var(--brand-mid); }

  /* ── Main layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

  /* ── Section card ── */
  .section-card {
    background: white; border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: var(--header-bg);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: #1a3354; }
  .section-title-wrap { display: flex; align-items: center; gap: 12px; }
  .section-num {
    font-size: 11px; font-weight: 800;
    background: rgba(255,255,255,0.15);
    color: white; padding: 2px 8px; border-radius: 999px;
  }
  .section-title { font-size: 15px; font-weight: 700; color: white; }
  .section-meta  { display: flex; align-items: center; gap: 10px; }
  .section-mini-pass  { font-size: 12px; color: #6EE7B7; font-weight: 700; }
  .section-mini-fail  { font-size: 12px; color: #FCA5A5; font-weight: 700; }
  .section-mini-total { font-size: 12px; color: #94A3B8; }
  .chevron { font-size: 12px; color: #94A3B8; transition: transform 0.2s; }
  .section-card.collapsed .chevron { transform: rotate(-90deg); }

  .section-body { display: block; }
  .section-card.collapsed .section-body { display: none; }

  /* ── Table ── */
  .test-table { width: 100%; border-collapse: collapse; }
  .test-table thead th {
    background: #F8FAFC;
    border-bottom: 2px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--grey);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .col-feature { width: 180px; }
  .col-steps   { width: auto; }
  .col-pass    { width: 70px;  text-align: center; }
  .col-fail    { width: 70px;  text-align: center; }
  .col-comment { width: 260px; }

  .test-table tbody tr { border-bottom: 1px solid #F1F5F9; transition: background 0.1s; }
  .test-table tbody tr:last-child { border-bottom: none; }
  .test-table tbody tr:hover { background: #FAFBFD; }

  .test-table tbody tr.row-pass { background: #F0FDF4 !important; }
  .test-table tbody tr.row-fail { background: #FFF5F5 !important; }

  td { padding: 12px 14px; vertical-align: top; }

  .feature-name {
    font-size: 13px; font-weight: 700; color: var(--text);
    line-height: 1.4;
  }

  .steps-list {
    list-style: none;
    display: flex; flex-direction: column; gap: 3px;
  }
  .steps-list li {
    font-size: 12px; color: var(--sub);
    display: flex; gap: 6px; align-items: baseline;
  }
  .steps-list li .step-num {
    flex-shrink: 0;
    width: 18px; height: 18px;
    background: var(--brand-light);
    color: var(--brand);
    border-radius: 50%;
    font-size: 10px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  /* ── Pass / Fail buttons ── */
  .action-cell { text-align: center; }
  .check-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    font-size: 16px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    outline: none;
  }
  .check-btn:hover { transform: scale(1.1); }
  .check-btn.pass-btn:hover,
  .check-btn.pass-btn.active {
    background: var(--pass-bg);
    border-color: var(--pass);
    color: var(--pass);
  }
  .check-btn.fail-btn:hover,
  .check-btn.fail-btn.active {
    background: var(--fail-bg);
    border-color: var(--fail);
    color: var(--fail);
  }
  .check-btn.pass-btn.active { box-shadow: 0 0 0 3px rgba(6,95,70,0.15); }
  .check-btn.fail-btn.active { box-shadow: 0 0 0 3px rgba(153,27,27,0.15); }

  /* ── Comment ── */
  .comment-input {
    width: 100%; padding: 7px 10px;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 12px; color: var(--text);
    resize: vertical; min-height: 38px; max-height: 120px;
    font-family: inherit;
    outline: none; transition: border-color 0.15s;
    background: #FAFBFD;
  }
  .comment-input:focus { border-color: var(--brand-mid); background: white; }
  .comment-input::placeholder { color: #CBD5E1; }

  /* ── Status badge in row ── */
  .row-status-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
    margin-top: 4px;
  }
  .badge-pass  { background: var(--pass-bg);  color: var(--pass);  border: 1px solid var(--pass-border); }
  .badge-fail  { background: var(--fail-bg);  color: var(--fail);  border: 1px solid var(--fail-border); }
  .badge-pend  { background: var(--amber-bg); color: var(--amber); border: 1px solid #FDE68A; }

  /* ── Print ── */
  @media print {
    .toolbar, .app-header .header-meta { display: none; }
    .app-header { position: static; }
    .section-card.collapsed .section-body { display: block !important; }
    body { background: white; font-size: 11px; }
    .check-btn { border: 1.5px solid #ccc; }
    .comment-input { border: 1px solid #ccc; }
  }

  /* ── Highlight search ── */
  .highlight { background: #FEF9C3; border-radius: 2px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--header-bg); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0; transform: translateY(8px);
    transition: all 0.25s;
    z-index: 9999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Expand all btn alignment */
  .spacer { flex: 1; }

  /* ── Tester info panel ── */
  .tester-panel {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
  }
  .tester-field { display: flex; flex-direction: column; gap: 4px; }
  .tester-field label {
    font-size: 10px; font-weight: 700; color: var(--grey);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tester-field input, .tester-field select {
    padding: 6px 10px; border-radius: 7px;
    border: 1.5px solid var(--border);
    font-size: 13px; font-family: inherit; outline: none;
    color: var(--text); background: #FAFBFD;
    transition: border-color 0.15s;
    min-width: 160px;
  }
  .tester-field input:focus, .tester-field select:focus { border-color: var(--brand-mid); background: white; }
  .tester-field.wide input { min-width: 260px; }
  .tester-saved-badge {
    font-size: 11px; color: #059669; font-weight: 600;
    background: #ECFDF5; border: 1px solid #A7F3D0;
    padding: 3px 10px; border-radius: 999px;
    align-self: flex-end; margin-bottom: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .tester-saved-badge.show { opacity: 1; }

  /* ── Save/Load buttons ── */
  .btn-save   { background: #ECFDF5; color: #065F46; border: 1.5px solid #A7F3D0; }
  .btn-save:hover { background: #D1FAE5; }
  .btn-load   { background: #EFF6FF; color: #1E40AF; border: 1.5px solid #BFDBFE; }
  .btn-load:hover { background: #DBEAFE; }
  .btn-export { background: #1E4FA8; color: white; }
  .btn-export:hover { background: #1a3d8a; }
  .btn-email  { background: #0F766E; color: white; }
  .btn-email:hover  { background: #0D6B63; }

  /* ── Export modal overlay ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white; border-radius: 14px;
    width: 92%; max-width: 860px; max-height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .modal-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 17px; font-weight: 800; color: var(--text); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    border: none; background: var(--grey-light);
    font-size: 18px; cursor: pointer; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body {
    overflow-y: auto; padding: 20px 24px;
    flex: 1;
  }
  .modal-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  /* ── Summary report inside modal ── */
  .report-header {
    background: var(--header-bg); color: white;
    border-radius: 10px; padding: 20px 24px; margin-bottom: 20px;
  }
  .report-header h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .report-meta { font-size: 12px; color: #94A3B8; margin-bottom: 14px; }
  .report-stats {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .report-stat {
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 700;
  }
  .rs-total  { background: rgba(255,255,255,0.12); color: #E2E8F0; }
  .rs-pass   { background: rgba(52,211,153,0.25); color: #6EE7B7; }
  .rs-fail   { background: rgba(248,113,113,0.25); color: #FCA5A5; }
  .rs-pend   { background: rgba(251,191,36,0.2); color: #FDE68A; }

  .report-section { margin-bottom: 18px; }
  .report-section-head {
    display: flex; align-items: center; justify-content: space-between;
    background: #F8FAFC; border: 1px solid var(--border);
    border-radius: 8px 8px 0 0; padding: 10px 16px;
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .report-section-pills { display: flex; gap: 8px; }
  .rpill { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 999px; }
  .rpill-pass { background: var(--pass-bg); color: var(--pass); border: 1px solid var(--pass-border); }
  .rpill-fail { background: var(--fail-bg); color: var(--fail); border: 1px solid var(--fail-border); }
  .rpill-pend { background: var(--amber-bg); color: var(--amber); border: 1px solid #FDE68A; }

  .report-test-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 16px; border: 1px solid var(--border); border-top: none;
    font-size: 12px;
  }
  .report-test-row:last-child { border-radius: 0 0 8px 8px; }
  .report-test-row.rpass { background: #F0FDF4; }
  .report-test-row.rfail { background: #FFF5F5; }
  .report-test-row.rpend { background: #FFFBEB; }
  .rt-status { flex-shrink: 0; font-weight: 800; font-size: 13px; width: 20px; margin-top: 1px; }
  .rt-pass { color: var(--pass); }
  .rt-fail { color: var(--fail); }
  .rt-pend { color: var(--amber); }
  .rt-body { flex: 1; min-width: 0; }
  .rt-feature { font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .rt-note { color: var(--sub); font-style: italic; margin-top: 4px; padding: 4px 8px; background: rgba(0,0,0,0.04); border-radius: 5px; border-left: 3px solid var(--brand-mid); }
  .rt-steps { color: var(--sub); margin-top: 4px; font-size: 11px; line-height: 1.6; }

  .report-divider { height: 1px; background: var(--border); margin: 10px 0; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="app-header">
  <h1>GearOps — Test Checklist</h1>
  <p id="gen-date">Version 2.0 &nbsp;·&nbsp; Open from the network drive — progress saves locally in your browser</p>
  <div class="header-meta">
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 of 0 tested</div>
    </div>
    <div class="stat-pills">
      <div class="stat-pill pill-total"><span>📋</span><span id="stat-total">0</span> total</div>
      <div class="stat-pill pill-pass"><span>✔</span><span id="stat-pass">0</span> passed</div>
      <div class="stat-pill pill-fail"><span>✘</span><span id="stat-fail">0</span> failed</div>
      <div class="stat-pill pill-pending"><span>○</span><span id="stat-pend">0</span> untested</div>
    </div>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <button class="btn btn-outline" onclick="expandAll()">&#x2195; Expand All</button>
  <button class="btn btn-outline" onclick="collapseAll()">&#x2195; Collapse All</button>
  <button class="btn btn-save"   onclick="saveToDisk()">&#x1F4BE; Save to File</button>
  <button class="btn btn-load"   onclick="document.getElementById('file-loader').click()">&#x1F4C2; Load from File</button>
  <button class="btn btn-export" onclick="exportSummary()">&#x1F4C4; Export Report</button>
  <button class="btn btn-email"  onclick="emailReport()">&#x2709; Email Report</button>
  <button class="btn btn-danger" onclick="clearAll()">&#x2715; Clear All</button>
  <div class="spacer"></div>
  <input class="search-box" type="text" placeholder="Search tests..." oninput="filterTests(this.value)" id="search-input">
</div>

<!-- ── Tester info panel ── -->
<div class="tester-panel" id="tester-panel">
  <div class="tester-field">
    <label for="tester-name">Tester Name</label>
    <input type="text" id="tester-name" placeholder="Your full name" oninput="saveTesterInfo()">
  </div>
  <div class="tester-field">
    <label for="tester-platform">Platform / Device</label>
    <select id="tester-platform" onchange="saveTesterInfo()">
      <option value="">-- Select --</option>
      <option value="iOS (iPhone)">iOS (iPhone)</option>
      <option value="iOS (iPad)">iOS (iPad)</option>
      <option value="Android (Phone)">Android (Phone)</option>
      <option value="Android (Tablet)">Android (Tablet)</option>
      <option value="Web (Desktop)">Web (Desktop)</option>
      <option value="Web (Mobile)">Web (Mobile)</option>
    </select>
  </div>
  <div class="tester-field">
    <label for="tester-env">Environment</label>
    <select id="tester-env" onchange="saveTesterInfo()">
      <option value="">-- Select --</option>
      <option value="Development">Development</option>
      <option value="Staging">Staging</option>
      <option value="Production">Production</option>
    </select>
  </div>
  <div class="tester-field">
    <label for="tester-version">App Version</label>
    <input type="text" id="tester-version" placeholder="e.g. 1.4.2" oninput="saveTesterInfo()">
  </div>
  <div class="tester-field wide">
    <label for="tester-notes">General Notes</label>
    <input type="text" id="tester-notes" placeholder="Any overall comments about this test run..." oninput="saveTesterInfo()">
  </div>
  <span class="tester-saved-badge" id="tester-saved-badge">Saved</span>
</div>

<!-- Hidden file input for Load from File -->
<input type="file" id="file-loader" accept=".json" style="display:none" onchange="loadFromDisk(event)">

<!-- ── Export modal ── -->
<div class="modal-overlay" id="export-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Test Report Preview</h2>
      <button class="modal-close" onclick="closeModal()" title="Close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-report-body">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-export" onclick="downloadReport()">&#x2B07; Download HTML Report</button>
      <button class="btn btn-email"  onclick="emailReport()">&#x2709; Email Report</button>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div class="main" id="main-content"></div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
// ─── All test data ────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    num: '1', title: 'Authentication & User Management',
    tests: [
      { id: 'auth-1', feature: 'Login – Valid',
        steps: ['Open app', 'Enter valid email/password', 'Tap Login', 'Verify redirect to dashboard'] },
      { id: 'auth-2', feature: 'Login – Invalid Credentials',
        steps: ['Enter wrong email/password', 'Verify error message appears', 'Verify no redirect occurs'] },
      { id: 'auth-3', feature: 'Login – Empty Fields',
        steps: ['Leave fields empty', 'Tap Login', 'Verify validation message'] },
      { id: 'auth-4', feature: 'Registration',
        steps: ['Navigate to Register', 'Fill all required fields', 'Submit', 'Verify account creation email'] },
      { id: 'auth-5', feature: 'Forgot Password',
        steps: ['Tap "Forgot Password"', 'Enter registered email', 'Verify reset email sent'] },
      { id: 'auth-6', feature: 'Logout',
        steps: ['Tap Logout', 'Verify redirect to login', 'Verify session is cleared'] },
      { id: 'auth-7', feature: 'Session Persistence',
        steps: ['Login', 'Close & reopen app', 'Verify still logged in'] },
      { id: 'auth-8', feature: 'Auto-logout on Token Expiry',
        steps: ['Login', 'Wait for token expiry', 'Perform action', 'Verify redirect to login'] },
    ],
  },
  {
    num: '2', title: 'Dashboard',
    tests: [
      { id: 'dash-1', feature: 'Dashboard Load',
        steps: ['Login', 'Verify dashboard displays', 'All sections visible (Tasks, Recent, Shortcuts)'] },
      { id: 'dash-2', feature: 'My Tasks Section',
        steps: ['View tasks list', 'Scroll through items', 'Verify task details'] },
      { id: 'dash-3', feature: 'Task Actions',

// ─── State ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'gearops_checklist_v2';
const TESTER_KEY  = 'gearops_tester_info_v2';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch (_) { state = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getTestState(id) {
  return state[id] || { result: 'pending', comment: '' };
}

// ─── Tester info ──────────────────────────────────────────────────────────────
function getTesterInfo() {
  return {
    name:     (document.getElementById('tester-name')    || {}).value || '',
    platform: (document.getElementById('tester-platform')|| {}).value || '',
    env:      (document.getElementById('tester-env')     || {}).value || '',
    version:  (document.getElementById('tester-version') || {}).value || '',
    notes:    (document.getElementById('tester-notes')   || {}).value || '',
  };
}
function setTesterInfo(info) {
  if (!info) return;
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('tester-name',     info.name);
  set('tester-platform', info.platform);
  set('tester-env',      info.env);
  set('tester-version',  info.version);
  set('tester-notes',    info.notes);
}
function saveTesterInfo() {
  localStorage.setItem(TESTER_KEY, JSON.stringify(getTesterInfo()));
  const badge = document.getElementById('tester-saved-badge');
  if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 1600); }
}
function loadTesterInfo() {
  try { setTesterInfo(JSON.parse(localStorage.getItem(TESTER_KEY) || 'null')); } catch (_) {}
}

// ─── Save to File (JSON) ──────────────────────────────────────────────────────
function saveToDisk() {
  const snapshot = {
    version: 2,
    exportedAt: new Date().toISOString(),
    testerInfo: getTesterInfo(),
    results: state,
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'GearOps_TestResults_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Results saved to file');
}

// ─── Load from File (JSON) ────────────────────────────────────────────────────
function loadFromDisk(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const snapshot = JSON.parse(e.target.result);
      if (snapshot && snapshot.results) {
        if (!confirm('Load results from "' + file.name + '"?\nThis will replace your local progress in this browser.')) {
          event.target.value = '';
          return;
        }
        state = snapshot.results;
        saveState();
        if (snapshot.testerInfo) {
          setTesterInfo(snapshot.testerInfo);
          localStorage.setItem(TESTER_KEY, JSON.stringify(snapshot.testerInfo));
        }
        render();
        showToast('Results loaded from file');
      } else {
        alert('This file does not appear to be a valid AMA test results file.');
      }
    } catch (_) {
      alert('Could not read file. Make sure it is a valid JSON results file.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

  container.innerHTML = '';
  SECTIONS.forEach(section => {

    card.className = 'section-card';
    card.id = 'section-' + section.num;

    card.innerHTML = `

        </div>
        <div class="section-meta">
          <span class="section-mini-pass" id="s-pass-${section.num}">✔ 0</span>
          <span class="section-mini-fail" id="s-fail-${section.num}">✘ 0</span>
          <span class="section-mini-total" id="s-total-${section.num}">of ${section.tests.length}</span>
          <span class="chevron">▼</span>

      </div>
      <div class="section-body">
        <table class="test-table">
          <thead>
            <tr>
              <th class="col-feature">Feature / Scenario</th>
              <th class="col-steps">Test Steps</th>
              <th class="col-pass">✔ Pass</th>
              <th class="col-fail">✘ Fail</th>
              <th class="col-comment">Notes / Comments</th>
            </tr>
          </thead>
          <tbody id="tbody-${section.num}">
          </tbody>
        </table>
      </div>`;
    container.appendChild(card);

    const tbody = document.getElementById('tbody-' + section.num);
    section.tests.forEach(test => {
      const ts = getTestState(test.id);
      const tr = document.createElement('tr');
      tr.id = 'row-' + test.id;
      if (ts.result === 'pass') tr.className = 'row-pass';
      if (ts.result === 'fail') tr.className = 'row-fail';

      const stepItems = test.steps.map((s, i) =>
        `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`
      ).join('');

      tr.innerHTML = `
        <td>
          <div class="feature-name">${test.feature}</div>
          ${ts.result !== 'pending' ? `<span class="row-status-badge badge-${ts.result}">${ts.result === 'pass' ? '✔ Passed' : '✘ Failed'}</span>` : `<span class="row-status-badge badge-pend">○ Untested</span>`}
        </td>
        <td><ul class="steps-list">${stepItems}</ul></td>
        <td class="action-cell">
          <button class="check-btn pass-btn ${ts.result === 'pass' ? 'active' : ''}"
            title="Mark as passed"
            onclick="setResult('${test.id}','${section.num}','pass')">✔</button>
        </td>
        <td class="action-cell">
          <button class="check-btn fail-btn ${ts.result === 'fail' ? 'active' : ''}"
            title="Mark as failed"
            onclick="setResult('${test.id}','${section.num}','fail')">✘</button>
        </td>
        <td>
          <textarea class="comment-input"
            placeholder="Add notes or comments…"
            oninput="setComment('${test.id}')"
            id="comment-${test.id}">${ts.comment || ''}</textarea>
        </td>`;
      tbody.appendChild(tr);
    });
  });

  updateStats();
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function setResult(testId, sectionNum, result) {
  const ts = getTestState(testId);
  // Toggle off if already set
  const newResult = ts.result === result ? 'pending' : result;
  state[testId] = { ...ts, result: newResult };
  saveState();

  const row = document.getElementById('row-' + testId);
  row.className = newResult === 'pass' ? 'row-pass' : newResult === 'fail' ? 'row-fail' : '';

  // Update badge in feature cell
  const badge = row.querySelector('.row-status-badge');
  if (newResult === 'pass') { badge.className = 'row-status-badge badge-pass'; badge.textContent = '✔ Passed'; }
  else if (newResult === 'fail') { badge.className = 'row-status-badge badge-fail'; badge.textContent = '✘ Failed'; }
  else { badge.className = 'row-status-badge badge-pend'; badge.textContent = '○ Untested'; }

  // Update button active states
  row.querySelector('.pass-btn').classList.toggle('active', newResult === 'pass');
  row.querySelector('.fail-btn').classList.toggle('active', newResult === 'fail');

  updateStats();
}

function setComment(testId) {
  const el = document.getElementById('comment-' + testId);
  const ts = getTestState(testId);
  state[testId] = { ...ts, comment: el.value };
  saveState();
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  let total = 0, passed = 0, failed = 0;

  SECTIONS.forEach(section => {
    let sp = 0, sf = 0;
    section.tests.forEach(t => {
      total++;
      const r = getTestState(t.id).result;
      if (r === 'pass') { passed++; sp++; }
      if (r === 'fail') { failed++; sf++; }
    });
    const pe = document.getElementById('s-pass-' + section.num);
    const fe = document.getElementById('s-fail-' + section.num);
    if (pe) pe.textContent = `✔ ${sp}`;
    if (fe) fe.textContent = `✘ ${sf}`;
  });

  const tested = passed + failed;
  const pct = total > 0 ? Math.round((tested / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${tested} of ${total} tested (${pct}%)`;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pass').textContent = passed;
  document.getElementById('stat-fail').textContent = failed;
  document.getElementById('stat-pend').textContent = total - tested;
}

// ─── Section toggle ───────────────────────────────────────────────────────────
function toggleSection(num) {
  const card = document.getElementById('section-' + num);
  card.classList.toggle('collapsed');
}
function expandAll()   { document.querySelectorAll('.section-card').forEach(c => c.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.section-card').forEach(c => c.classList.add('collapsed')); }

// ─── Clear all ────────────────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear all test results and comments? This cannot be undone.\n\nThis only clears your local browser copy.')) return;
  state = {};
  saveState();
  render();
  showToast('All results cleared');
}

// ─── Search / filter ──────────────────────────────────────────────────────────
function filterTests(query) {
  const q = query.toLowerCase().trim();
  SECTIONS.forEach(section => {
    let sectionHasMatch = false;
    section.tests.forEach(test => {
      const row = document.getElementById('row-' + test.id);
      if (!row) return;
      const text = (test.feature + ' ' + test.steps.join(' ')).toLowerCase();
      const match = !q || text.includes(q);
      row.style.display = match ? '' : 'none';
      if (match) sectionHasMatch = true;
    });
    const card = document.getElementById('section-' + section.num);
    if (card) {
      card.style.display = (!q || sectionHasMatch) ? '' : 'none';
      if (q && sectionHasMatch) card.classList.remove('collapsed');
    }
  });
}

// ─── Export Report ───────────────────────────────────────────────────────────
let _reportHtml = '';

function buildReport() {
  const tester  = getTesterInfo();
  const dateStr = new Date().toLocaleString('en-AU', {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });

  let totalPass = 0, totalFail = 0, totalPend = 0;

  // Pre-count totals
  SECTIONS.forEach(section => {
    section.tests.forEach(t => {
      const r = getTestState(t.id).result;
      if (r === 'pass') totalPass++;
      else if (r === 'fail') totalFail++;
      else totalPend++;
    });
  });
  const totalAll = totalPass + totalFail + totalPend;
  const pct = totalAll > 0 ? Math.round(((totalPass + totalFail) / totalAll) * 100) : 0;

  // Build section rows HTML
  let sectionsHtml = '';
  SECTIONS.forEach(section => {
    let sp = 0, sf = 0, su = 0;
    let testRowsHtml = '';
    section.tests.forEach(t => {
      const ts = getTestState(t.id);
      const r  = ts.result;
      if (r === 'pass') sp++;
      else if (r === 'fail') sf++;
      else su++;

      const icon  = r === 'pass' ? '&#x2714;' : r === 'fail' ? '&#x2718;' : '&#x25CB;';
      const cls   = r === 'pass' ? 'rpass' : r === 'fail' ? 'rfail' : 'rpend';
      const icls  = r === 'pass' ? 'rt-pass' : r === 'fail' ? 'rt-fail' : 'rt-pend';
      const label = r === 'pass' ? 'PASS' : r === 'fail' ? 'FAIL' : 'SKIP';

      const stepsHtml = t.steps.map((s, i) =>
        (i + 1) + '. ' + s
      ).join('  |  ');

      const noteHtml = ts.comment
        ? '<div class="rt-note">Note: ' + ts.comment.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'
        : '';

      testRowsHtml += `
        <div class="report-test-row ${cls}">
          <div class="rt-status ${icls}">${icon}</div>
          <div class="rt-body">
            <div class="rt-feature">${t.feature} <span style="font-size:10px;font-weight:600;opacity:.7">${label}</span></div>
            <div class="rt-steps">${stepsHtml}</div>
            ${noteHtml}
          </div>
        </div>`;
    });

    const pillsHtml =
      (sp ? `<span class="rpill rpill-pass">&#x2714; ${sp} pass</span>` : '') +
      (sf ? `<span class="rpill rpill-fail">&#x2718; ${sf} fail</span>` : '') +
      (su ? `<span class="rpill rpill-pend">&#x25CB; ${su} skip</span>` : '');

    sectionsHtml += `
      <div class="report-section">
        <div class="report-section-head">
          <span>${section.num}. ${section.title}</span>
          <div class="report-section-pills">${pillsHtml}</div>
        </div>
        ${testRowsHtml}
      </div>`;
  });

  // Tester info rows
  const testerRows = [
    tester.name     ? '<tr><td style="width:120px;font-weight:600;color:#475569;padding:4px 8px;">Tester</td><td style="padding:4px 8px;">' + tester.name + '</td></tr>' : '',
    tester.platform ? '<tr><td style="font-weight:600;color:#475569;padding:4px 8px;">Platform</td><td style="padding:4px 8px;">' + tester.platform + '</td></tr>' : '',
    tester.env      ? '<tr><td style="font-weight:600;color:#475569;padding:4px 8px;">Environment</td><td style="padding:4px 8px;">' + tester.env + '</td></tr>' : '',
    tester.version  ? '<tr><td style="font-weight:600;color:#475569;padding:4px 8px;">App Version</td><td style="padding:4px 8px;">' + tester.version + '</td></tr>' : '',
    tester.notes    ? '<tr><td style="font-weight:600;color:#475569;padding:4px 8px;">Notes</td><td style="padding:4px 8px;font-style:italic;">' + tester.notes.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</td></tr>' : '',
  ].filter(Boolean).join('');

  const testerBlock = testerRows
    ? '<table style="border-collapse:collapse;font-size:12px;margin-top:10px;">' + testerRows + '</table>'
    : '<p style="font-size:12px;color:#94A3B8;margin-top:8px;">No tester info provided.</p>';

  // Assemble full report HTML (self-contained, for download)
  _reportHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GearOps Test Report - ${dateStr}</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background:#F1F5F9; color:#0F172A; font-size:13px; margin:0; padding:24px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  .report-header { background:#1E3A5F; color:white; border-radius:10px; padding:24px; margin-bottom:20px; }
  .report-header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
  .report-meta { font-size:12px; color:#94A3B8; margin-bottom:16px; }
  .report-stats { display:flex; gap:10px; flex-wrap:wrap; }
  .report-stat { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; }
  .rs-total { background:rgba(255,255,255,.12); color:#E2E8F0; }
  .rs-pass  { background:rgba(52,211,153,.25); color:#6EE7B7; }
  .rs-fail  { background:rgba(248,113,113,.25); color:#FCA5A5; }
  .rs-pend  { background:rgba(251,191,36,.2); color:#FDE68A; }
  .tester-block { background:white; border:1px solid #CBD5E1; border-radius:10px; padding:16px 20px; margin-bottom:20px; }
  .tester-block h3 { font-size:13px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .report-section { margin-bottom:18px; }
  .report-section-head { display:flex; align-items:center; justify-content:space-between; background:#F8FAFC; border:1px solid #CBD5E1; border-radius:8px 8px 0 0; padding:10px 16px; font-size:13px; font-weight:700; }
  .report-section-pills { display:flex; gap:8px; }
  .rpill { font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px; }
  .rpill-pass { background:#ECFDF5; color:#065F46; border:1px solid #A7F3D0; }
  .rpill-fail { background:#FEE2E2; color:#991B1B; border:1px solid #FECACA; }
  .rpill-pend { background:#FEF3C7; color:#92400E; border:1px solid #FDE68A; }
  .report-test-row { display:flex; align-items:flex-start; gap:12px; padding:10px 16px; border:1px solid #CBD5E1; border-top:none; font-size:12px; }
  .report-test-row:last-child { border-radius:0 0 8px 8px; }
  .rpass { background:#F0FDF4; }
  .rfail { background:#FFF5F5; }
  .rpend { background:#FFFBEB; }
  .rt-status { flex-shrink:0; font-weight:800; font-size:14px; width:20px; margin-top:1px; }
  .rt-pass { color:#065F46; }
  .rt-fail { color:#991B1B; }
  .rt-pend { color:#92400E; }
  .rt-body { flex:1; min-width:0; }
  .rt-feature { font-weight:700; color:#0F172A; margin-bottom:2px; }
  .rt-note { color:#475569; font-style:italic; margin-top:4px; padding:4px 8px; background:rgba(0,0,0,.04); border-radius:5px; border-left:3px solid #2563EB; }
  .rt-steps { color:#64748B; margin-top:4px; font-size:11px; line-height:1.6; }
  @media print { body { background:white; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="report-header">
    <h1>GearOps — Test Report</h1>
    <div class="report-meta">Generated: ${dateStr} &nbsp;|&nbsp; ${pct}% of tests executed</div>
    <div class="report-stats">
      <div class="report-stat rs-total">&#x1F4CB; ${totalAll} Total</div>
      <div class="report-stat rs-pass">&#x2714; ${totalPass} Passed</div>
      <div class="report-stat rs-fail">&#x2718; ${totalFail} Failed</div>
      <div class="report-stat rs-pend">&#x25CB; ${totalPend} Untested</div>
    </div>
  </div>
  <div class="tester-block">
    <h3>Tester Information</h3>
    ${testerBlock}
  </div>
  ${sectionsHtml}
</div>
</body></html>`;

  // Render preview in modal
  document.getElementById('modal-report-body').innerHTML = `
    <div class="report-header">
      <h1>GearOps — Test Report</h1>
      <div class="report-meta">${dateStr} &nbsp;|&nbsp; ${pct}% executed</div>
      <div class="report-stats">
        <div class="report-stat rs-total">&#x1F4CB; ${totalAll} Total</div>
        <div class="report-stat rs-pass">&#x2714; ${totalPass} Passed</div>
        <div class="report-stat rs-fail">&#x2718; ${totalFail} Failed</div>
        <div class="report-stat rs-pend">&#x25CB; ${totalPend} Untested</div>
      </div>
    </div>
    <div style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Tester Information</div>
      ${testerBlock}
    </div>
    ${sectionsHtml}`;

  document.getElementById('export-modal').classList.add('open');
}

function exportSummary() {
  buildReport();
}

function closeModal() {
  document.getElementById('export-modal').classList.remove('open');
}

function downloadReport() {
  if (!_reportHtml) return;
  const blob = new Blob([_reportHtml], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'GearOps_Test_Report_' + new Date().toISOString().slice(0, 10) + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Report downloaded');
}

// ─── Email Report ─────────────────────────────────────────────────────────────
function emailReport() {
  // Auto-generate the report if it hasn't been built yet
  // (handles clicking Email Report directly from the toolbar — no modal opened)
  if (!_reportHtml) buildReport();

  // Download the HTML report so the tester can attach it
  downloadReport();

  // Build a plain-text summary for the email body
  const tester  = getTesterInfo();
  const dateStr = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  const timeStr = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  let totalPass = 0, totalFail = 0, totalPend = 0;
  SECTIONS.forEach(s => s.tests.forEach(t => {
    const r = getTestState(t.id).result;
    if (r === 'pass') totalPass++; else if (r === 'fail') totalFail++; else totalPend++;
  }));
  const totalAll = totalPass + totalFail + totalPend;
  const pct = totalAll > 0 ? Math.round(((totalPass + totalFail) / totalAll) * 100) : 0;

  let body = 'GearOps Test Report\n';
  body += '===================\n';
  body += 'Date: ' + dateStr + ' at ' + timeStr + '\n';
  if (tester.name)     body += 'Tester: '      + tester.name     + '\n';
  if (tester.platform) body += 'Platform: '    + tester.platform + '\n';
  if (tester.env)      body += 'Environment: ' + tester.env      + '\n';
  if (tester.version)  body += 'App Version: ' + tester.version  + '\n';
  if (tester.notes)    body += 'Notes: '       + tester.notes    + '\n';
  body += '\nOVERALL RESULTS\n';
  body += '  Total:    ' + totalAll  + '\n';
  body += '  Passed:   ' + totalPass + '\n';
  body += '  Failed:   ' + totalFail + '\n';
  body += '  Untested: ' + totalPend + '\n';
  body += '  Progress: ' + pct + '% tested\n';
  body += '\nBY SECTION\n';
  SECTIONS.forEach(s => {
    let sp = 0, sf = 0, su = 0;
    s.tests.forEach(t => {
      const r = getTestState(t.id).result;
      if (r === 'pass') sp++; else if (r === 'fail') sf++; else su++;
    });
    body += '  ' + s.num + '. ' + s.title + ' — Pass: ' + sp + '  Fail: ' + sf + '  Skip: ' + su + '\n';
  });

  const failures = [];
  SECTIONS.forEach(s => s.tests.forEach(t => {
    const ts = getTestState(t.id);
    if (ts.result === 'fail') {
      failures.push('  [' + s.title + '] ' + t.feature + (ts.comment ? '\n    Note: ' + ts.comment : ''));
    }
  }));
  if (failures.length) {
    body += '\nFAILED TESTS (' + failures.length + ')\n';
    body += failures.join('\n') + '\n';
  }

  body += '\n--\nFull HTML report has been downloaded to your machine.\nPlease attach it to this email before sending.';

  const subject = encodeURIComponent('GearOps Test Report — ' + dateStr + (tester.name ? ' (' + tester.name + ')' : ''));
  const encodedBody = encodeURIComponent(body);
  const mailto = 'mailto:sverma@engsurveys.com.au?subject=' + subject + '&body=' + encodedBody;

  const link = document.createElement('a');
  link.href = mailto;
  link.click();

  showToast('Email opened — attach the downloaded HTML report');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  loadTesterInfo();
  render();
  document.getElementById('gen-date').textContent =
    'GearOps Test Checklist  ·  ' + new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }) +
    '  ·  Progress auto-saved locally in your browser  ·  Use Save to File to keep your own copy';

  // Close modal on overlay click
  document.getElementById('export-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
});
</script>
