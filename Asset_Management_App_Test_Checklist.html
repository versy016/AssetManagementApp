<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Management App — Test Checklist</title>
<style>
  :root {
    --brand:      #1E4FA8;
    --brand-mid:  #2563EB;
    --brand-light:#EBF0FB;
    --header-bg:  #1E3A5F;
    --pass:       #065F46;
    --pass-bg:    #ECFDF5;
    --pass-border:#A7F3D0;
    --fail:       #991B1B;
    --fail-bg:    #FEE2E2;
    --fail-border:#FECACA;
    --amber:      #92400E;
    --amber-bg:   #FEF3C7;
    --grey:       #64748B;
    --grey-light: #F8FAFC;
    --border:     #CBD5E1;
    --text:       #0F172A;
    --sub:        #475569;
    --white:      #FFFFFF;
    --radius:     10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #F1F5F9;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .app-header {
    background: var(--header-bg);
    color: white;
    padding: 20px 32px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .app-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
  .app-header p  { font-size: 13px; color: #94A3B8; margin-top: 2px; }
  .header-meta   { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }

  /* ── Progress bar ── */
  .progress-wrap { flex: 1; min-width: 220px; }
  .progress-bar-bg {
    height: 8px; border-radius: 4px; background: rgba(255,255,255,0.15);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #34D399, #10B981);
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 12px; color: #CBD5E1; margin-top: 4px; }

  /* ── Stat pills ── */
  .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 700; cursor: default;
  }
  .pill-total   { background: rgba(255,255,255,0.12); color: #E2E8F0; }
  .pill-pass    { background: rgba(52,211,153,0.2);   color: #6EE7B7; }
  .pill-fail    { background: rgba(248,113,113,0.2);  color: #FCA5A5; }
  .pill-pending { background: rgba(251,191,36,0.2);   color: #FDE68A; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 32px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 112px; z-index: 90;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--brand-mid); color: white; }
  .btn-primary:hover { background: var(--brand); }
  .btn-outline { background: white; color: var(--sub); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--grey-light); }
  .btn-danger  { background: var(--fail-bg); color: var(--fail); border: 1.5px solid var(--fail-border); }
  .btn-danger:hover { background: #FEE2E2; }

  .search-box {
    margin-left: auto;
    padding: 7px 12px; border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px; width: 220px; outline: none;
  }
  .search-box:focus { border-color: var(--brand-mid); }

  /* ── Main layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

  /* ── Section card ── */
  .section-card {
    background: white; border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: var(--header-bg);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: #1a3354; }
  .section-title-wrap { display: flex; align-items: center; gap: 12px; }
  .section-num {
    font-size: 11px; font-weight: 800;
    background: rgba(255,255,255,0.15);
    color: white; padding: 2px 8px; border-radius: 999px;
  }
  .section-title { font-size: 15px; font-weight: 700; color: white; }
  .section-meta  { display: flex; align-items: center; gap: 10px; }
  .section-mini-pass  { font-size: 12px; color: #6EE7B7; font-weight: 700; }
  .section-mini-fail  { font-size: 12px; color: #FCA5A5; font-weight: 700; }
  .section-mini-total { font-size: 12px; color: #94A3B8; }
  .chevron { font-size: 12px; color: #94A3B8; transition: transform 0.2s; }
  .section-card.collapsed .chevron { transform: rotate(-90deg); }

  .section-body { display: block; }
  .section-card.collapsed .section-body { display: none; }

  /* ── Table ── */
  .test-table { width: 100%; border-collapse: collapse; }
  .test-table thead th {
    background: #F8FAFC;
    border-bottom: 2px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--grey);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .col-feature { width: 180px; }
  .col-steps   { width: auto; }
  .col-pass    { width: 70px;  text-align: center; }
  .col-fail    { width: 70px;  text-align: center; }
  .col-comment { width: 260px; }

  .test-table tbody tr { border-bottom: 1px solid #F1F5F9; transition: background 0.1s; }
  .test-table tbody tr:last-child { border-bottom: none; }
  .test-table tbody tr:hover { background: #FAFBFD; }

  .test-table tbody tr.row-pass { background: #F0FDF4 !important; }
  .test-table tbody tr.row-fail { background: #FFF5F5 !important; }

  td { padding: 12px 14px; vertical-align: top; }

  .feature-name {
    font-size: 13px; font-weight: 700; color: var(--text);
    line-height: 1.4;
  }

  .steps-list {
    list-style: none;
    display: flex; flex-direction: column; gap: 3px;
  }
  .steps-list li {
    font-size: 12px; color: var(--sub);
    display: flex; gap: 6px; align-items: baseline;
  }
  .steps-list li .step-num {
    flex-shrink: 0;
    width: 18px; height: 18px;
    background: var(--brand-light);
    color: var(--brand);
    border-radius: 50%;
    font-size: 10px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  /* ── Pass / Fail buttons ── */
  .action-cell { text-align: center; }
  .check-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    font-size: 16px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    outline: none;
  }
  .check-btn:hover { transform: scale(1.1); }
  .check-btn.pass-btn:hover,
  .check-btn.pass-btn.active {
    background: var(--pass-bg);
    border-color: var(--pass);
    color: var(--pass);
  }
  .check-btn.fail-btn:hover,
  .check-btn.fail-btn.active {
    background: var(--fail-bg);
    border-color: var(--fail);
    color: var(--fail);
  }
  .check-btn.pass-btn.active { box-shadow: 0 0 0 3px rgba(6,95,70,0.15); }
  .check-btn.fail-btn.active { box-shadow: 0 0 0 3px rgba(153,27,27,0.15); }

  /* ── Comment ── */
  .comment-input {
    width: 100%; padding: 7px 10px;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 12px; color: var(--text);
    resize: vertical; min-height: 38px; max-height: 120px;
    font-family: inherit;
    outline: none; transition: border-color 0.15s;
    background: #FAFBFD;
  }
  .comment-input:focus { border-color: var(--brand-mid); background: white; }
  .comment-input::placeholder { color: #CBD5E1; }

  /* ── Status badge in row ── */
  .row-status-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
    margin-top: 4px;
  }
  .badge-pass  { background: var(--pass-bg);  color: var(--pass);  border: 1px solid var(--pass-border); }
  .badge-fail  { background: var(--fail-bg);  color: var(--fail);  border: 1px solid var(--fail-border); }
  .badge-pend  { background: var(--amber-bg); color: var(--amber); border: 1px solid #FDE68A; }

  /* ── Print ── */
  @media print {
    .toolbar, .app-header .header-meta { display: none; }
    .app-header { position: static; }
    .section-card.collapsed .section-body { display: block !important; }
    body { background: white; font-size: 11px; }
    .check-btn { border: 1.5px solid #ccc; }
    .comment-input { border: 1px solid #ccc; }
  }

  /* ── Highlight search ── */
  .highlight { background: #FEF9C3; border-radius: 2px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--header-bg); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0; transform: translateY(8px);
    transition: all 0.25s;
    z-index: 9999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Expand all btn alignment */
  .spacer { flex: 1; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="app-header">
  <h1>Asset Management App — Test Checklist</h1>
  <p id="gen-date">Version 2.0 &nbsp;·&nbsp; Progress is saved automatically in your browser</p>
  <div class="header-meta">
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 of 0 tested</div>
    </div>
    <div class="stat-pills">
      <div class="stat-pill pill-total"><span>📋</span><span id="stat-total">0</span> total</div>
      <div class="stat-pill pill-pass"><span>✔</span><span id="stat-pass">0</span> passed</div>
      <div class="stat-pill pill-fail"><span>✘</span><span id="stat-fail">0</span> failed</div>
      <div class="stat-pill pill-pending"><span>○</span><span id="stat-pend">0</span> untested</div>
    </div>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <button class="btn btn-outline" onclick="expandAll()">↕ Expand All</button>
  <button class="btn btn-outline" onclick="collapseAll()">↕ Collapse All</button>
  <button class="btn btn-primary" onclick="exportSummary()">⬇ Export Summary</button>
  <button class="btn btn-danger"  onclick="clearAll()">✕ Clear All</button>
  <div class="spacer"></div>
  <input class="search-box" type="text" placeholder="🔍  Search tests…" oninput="filterTests(this.value)" id="search-input">
</div>

<!-- ── Main ── -->
<div class="main" id="main-content"></div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

// ─── State ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ama_checklist_v2';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch (_) { state = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getTestState(id) {
  return state[id] || { result: 'pending', comment: '' };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('main-content');
  container.innerHTML = '';
  SECTIONS.forEach(section => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'section-' + section.num;

    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.num}')">
        <div class="section-title-wrap">
          <span class="section-num">${section.num}</span>
          <span class="section-title">${section.title}</span>
        </div>
        <div class="section-meta">
          <span class="section-mini-pass" id="s-pass-${section.num}">✔ 0</span>
          <span class="section-mini-fail" id="s-fail-${section.num}">✘ 0</span>
          <span class="section-mini-total" id="s-total-${section.num}">of ${section.tests.length}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="section-body">
        <table class="test-table">
          <thead>
            <tr>
              <th class="col-feature">Feature / Scenario</th>
              <th class="col-steps">Test Steps</th>
              <th class="col-pass">✔ Pass</th>
              <th class="col-fail">✘ Fail</th>
              <th class="col-comment">Notes / Comments</th>
            </tr>
          </thead>
          <tbody id="tbody-${section.num}">
          </tbody>
        </table>
      </div>`;
    container.appendChild(card);

    const tbody = document.getElementById('tbody-' + section.num);
    section.tests.forEach(test => {
      const ts = getTestState(test.id);
      const tr = document.createElement('tr');
      tr.id = 'row-' + test.id;
      if (ts.result === 'pass') tr.className = 'row-pass';
      if (ts.result === 'fail') tr.className = 'row-fail';

      const stepItems = test.steps.map((s, i) =>
        `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`
      ).join('');

      tr.innerHTML = `
        <td>
          <div class="feature-name">${test.feature}</div>
          ${ts.result !== 'pending' ? `<span class="row-status-badge badge-${ts.result}">${ts.result === 'pass' ? '✔ Passed' : '✘ Failed'}</span>` : `<span class="row-status-badge badge-pend">○ Untested</span>`}
        </td>
        <td><ul class="steps-list">${stepItems}</ul></td>
        <td class="action-cell">
          <button class="check-btn pass-btn ${ts.result === 'pass' ? 'active' : ''}"
            title="Mark as passed"
            onclick="setResult('${test.id}','${section.num}','pass')">✔</button>
        </td>
        <td class="action-cell">
          <button class="check-btn fail-btn ${ts.result === 'fail' ? 'active' : ''}"
            title="Mark as failed"
            onclick="setResult('${test.id}','${section.num}','fail')">✘</button>
        </td>
        <td>
          <textarea class="comment-input"
            placeholder="Add notes or comments…"
            oninput="setComment('${test.id}')"
            id="comment-${test.id}">${ts.comment || ''}</textarea>
        </td>`;
      tbody.appendChild(tr);
    });
  });

  updateStats();
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function setResult(testId, sectionNum, result) {
  const ts = getTestState(testId);
  // Toggle off if already set
  const newResult = ts.result === result ? 'pending' : result;
  state[testId] = { ...ts, result: newResult };
  saveState();

  const row = document.getElementById('row-' + testId);
  row.className = newResult === 'pass' ? 'row-pass' : newResult === 'fail' ? 'row-fail' : '';

  // Update badge in feature cell
  const badge = row.querySelector('.row-status-badge');
  if (newResult === 'pass') { badge.className = 'row-status-badge badge-pass'; badge.textContent = '✔ Passed'; }
  else if (newResult === 'fail') { badge.className = 'row-status-badge badge-fail'; badge.textContent = '✘ Failed'; }
  else { badge.className = 'row-status-badge badge-pend'; badge.textContent = '○ Untested'; }

  // Update button active states
  row.querySelector('.pass-btn').classList.toggle('active', newResult === 'pass');
  row.querySelector('.fail-btn').classList.toggle('active', newResult === 'fail');

  updateStats();
}

function setComment(testId) {
  const el = document.getElementById('comment-' + testId);
  const ts = getTestState(testId);
  state[testId] = { ...ts, comment: el.value };
  saveState();
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  let total = 0, passed = 0, failed = 0;

  SECTIONS.forEach(section => {
    let sp = 0, sf = 0;
    section.tests.forEach(t => {
      total++;
      const r = getTestState(t.id).result;
      if (r === 'pass') { passed++; sp++; }
      if (r === 'fail') { failed++; sf++; }
    });
    const pe = document.getElementById('s-pass-' + section.num);
    const fe = document.getElementById('s-fail-' + section.num);
    if (pe) pe.textContent = `✔ ${sp}`;
    if (fe) fe.textContent = `✘ ${sf}`;
  });

  const tested = passed + failed;
  const pct = total > 0 ? Math.round((tested / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${tested} of ${total} tested (${pct}%)`;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pass').textContent = passed;
  document.getElementById('stat-fail').textContent = failed;
  document.getElementById('stat-pend').textContent = total - tested;
}

// ─── Section toggle ───────────────────────────────────────────────────────────
function toggleSection(num) {
  const card = document.getElementById('section-' + num);
  card.classList.toggle('collapsed');
}
function expandAll()   { document.querySelectorAll('.section-card').forEach(c => c.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.section-card').forEach(c => c.classList.add('collapsed')); }

// ─── Clear all ────────────────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear all test results and comments? This cannot be undone.')) return;
  state = {};
  saveState();
  render();
  showToast('All results cleared');
}

// ─── Search / filter ──────────────────────────────────────────────────────────
function filterTests(query) {
  const q = query.toLowerCase().trim();
  SECTIONS.forEach(section => {
    let sectionHasMatch = false;
    section.tests.forEach(test => {
      const row = document.getElementById('row-' + test.id);
      if (!row) return;
      const text = (test.feature + ' ' + test.steps.join(' ')).toLowerCase();
      const match = !q || text.includes(q);
      row.style.display = match ? '' : 'none';
      if (match) sectionHasMatch = true;
    });
    const card = document.getElementById('section-' + section.num);
    if (card) {
      card.style.display = (!q || sectionHasMatch) ? '' : 'none';
      if (q && sectionHasMatch) card.classList.remove('collapsed');
    }
  });
}

// ─── Export summary ───────────────────────────────────────────────────────────
function exportSummary() {
  const date = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  let passed = 0, failed = 0, pending = 0;
  let rows = '';

  SECTIONS.forEach(section => {
    let sp = 0, sf = 0, su = 0;
    section.tests.forEach(t => {
      const ts = getTestState(t.id);
      if (ts.result === 'pass') { passed++; sp++; }
      else if (ts.result === 'fail') { failed++; sf++; }
      else { pending++; su++; }
    });
    rows += `\n  ${section.num}. ${section.title}:  ✔ ${sp} passed  ✘ ${sf} failed  ○ ${su} untested`;
  });

  const failures = [];
  SECTIONS.forEach(section => {
    section.tests.forEach(t => {
      const ts = getTestState(t.id);
      if (ts.result === 'fail') {
        failures.push(`  [${section.title}] ${t.feature}${ts.comment ? '\n    Note: ' + ts.comment : ''}`);
      }
    });
  });

  const total = passed + failed + pending;
  const pct = total > 0 ? Math.round(((passed + failed) / total) * 100) : 0;

  let summary = `ASSET MANAGEMENT APP — TEST SUMMARY\n`;
  summary += `${'='.repeat(50)}\n`;
  summary += `Date: ${date}\n`;
  summary += `Progress: ${pct}% tested\n\n`;
  summary += `OVERALL RESULTS\n`;
  summary += `  Total tests:  ${total}\n`;
  summary += `  ✔ Passed:     ${passed}\n`;
  summary += `  ✘ Failed:     ${failed}\n`;
  summary += `  ○ Untested:   ${pending}\n\n`;
  summary += `BY SECTION\n${rows}\n`;
  if (failures.length) {
    summary += `\nFAILED TESTS (${failures.length})\n${'─'.repeat(40)}\n${failures.join('\n')}\n`;
  }

  const blob = new Blob([summary], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AMA_Test_Summary_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
  showToast('Summary exported');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
